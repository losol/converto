# Default values for converto (HTML-to-PDF microservice)
# This is a shared internal service – one instance per cluster.

replicaCount: 1

image:
  registry: docker.io
  repository: losolio/converto
  tag: '' # Set by CI/CD
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 3100

# Resource limits – Playwright/Chromium is memory-intensive.
resources:
  requests:
    memory: '256Mi'
    cpu: '100m'
    ephemeral-storage: '512Mi'
  limits:
    memory: '1Gi'
    cpu: '1000m'
    ephemeral-storage: '2Gi'

# Health check configuration
healthCheck:
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5

# High-availability settings (disabled by default for single-node compatibility)
# Override in environment-specific values for prod
strategy: {}
#   type: RollingUpdate
#   rollingUpdate:
#     maxUnavailable: 0
#     maxSurge: 1

podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network isolation (disabled by default – requires a CNI that enforces NetworkPolicy,
# and the allowed traffic depends on cluster topology). Enable + fill the rules in a
# prod overlay. When enabled, the policy is default-deny in both directions except:
#   - DNS egress (UDP/TCP 53), always allowed so the app can resolve names.
#   - The ingress/egress rules listed below.
# Note: this service fetches arbitrary external URLs for PDF rendering, so egress to the
# public internet is part of its normal function – scope it deliberately (egress proxy,
# allowed CIDRs) rather than leaving it wide open.
networkPolicy:
  enabled: false
  # Sources allowed to reach the service. Empty list = no ingress permitted when enabled.
  ingress: []
  #   - from:
  #       - namespaceSelector:
  #           matchLabels:
  #             kubernetes.io/metadata.name: eventuras
  #         podSelector:
  #           matchLabels:
  #             app.kubernetes.io/name: eventuras-api
  #     ports:
  #       - protocol: TCP
  #         port: 3100
  # Egress destinations beyond DNS (which is always allowed). Empty list = DNS only.
  egress: []
  #   - to:
  #       - ipBlock:
  #           cidr: 0.0.0.0/0
  #           except:
  #             - 10.0.0.0/8
  #             - 169.254.0.0/16
  #     ports:
  #       - protocol: TCP
  #         port: 443

topologySpreadConstraints: []
#   - maxSkew: 1
#     topologyKey: kubernetes.io/hostname
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels:
#         app.kubernetes.io/name: converto
#         app.kubernetes.io/instance: <release-name>

# Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container-level security context
# Chromium sandbox requires either SYS_ADMIN or --no-sandbox.
# We use --no-sandbox (via PLAYWRIGHT_NOSANDBOX) and drop all capabilities instead,
# relying on container isolation (non-root, seccomp, network policies) for security.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Non-sensitive environment variables
env:
  HOST: '0.0.0.0'
  PORT: '3100'
  BASE_URL: 'http://converto'
  PLAYWRIGHT_NOSANDBOX: 'true'
  HOME: '/tmp'

# Pod annotations
podAnnotations: {}
